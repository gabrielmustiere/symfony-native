services:
  mailpit:
    container_name: template-mailpit-dev
    image: 'axllent/mailpit:latest'
    ports:
      - '127.0.0.1:1027:1025'  # SMTP server
      - '127.0.0.1:8027:8025'  # Web UI
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:8025/readyz']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  meilisearch:
    container_name: template-meilisearch-dev
    image: 'getmeili/meilisearch:v1.12'
    ports:
      - '127.0.0.1:7700:7700'  # HTTP API + dashboard
    environment:
      MEILI_MASTER_KEY: masterKeyDevOnly
      MEILI_ENV: development
      MEILI_NO_ANALYTICS: 'true'
    volumes:
      - 'meili-data:/meili_data'
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:7700/health']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

volumes:
  meili-data:
